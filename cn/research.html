<main class="content">
  <h1>研究方向</h1>

  <p>
    我们实验室关注天然产物的发现、生物合成机制、微生物相互作用以及化学生物学功能。
  </p>

  <h2>天然产物发现</h2>
  <p>
    我们结合基因组挖掘、代谢组学、分子生物学和化学分析方法，从真菌中发现具有生物活性的小分子天然产物。
  </p>

  <h2>真菌次级代谢</h2>
  <p>
    我们研究真菌如何合成结构多样的次级代谢产物，以及这些分子在真菌生物学中的功能。
  </p>

  <h2>微生物相互作用</h2>
  <p>
    我们研究细菌及宿主之间的化学交流、竞争与互作机制。
  </p>

  <h2>化学生物学</h2>
  <p>
    我们希望理解天然产物的生物活性、作用靶点及其潜在应用。
  </p>
